name: Refresh News

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/update_news.py
      - run: python3 scripts/update_sec_filings.py
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT || 'Stock-Checking GitHub Action contact@example.com' }}
      - run: python3 scripts/build_company_index.py
      - run: python3 scripts/validate_data.py
      - name: Commit refreshed data
        run: |
          if [[ -n "$(git status --porcelain public/data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data
            git commit -m "chore: refresh company news data"
            git push
          else
            echo "No data changes"
          fi
