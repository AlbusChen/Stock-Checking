name: Weekly Research Refresh

on:
  workflow_dispatch:

  # Scheduled runs are intentionally disabled until generated research drafts have a review gate.
  # To enable later:
  # schedule:
  #   - cron: "31 2 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: python3 scripts/update_sec_filings.py
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT || 'Stock-Checking GitHub Action contact@example.com' }}
      - run: python3 scripts/build_company_index.py
      - run: python3 scripts/validate_data.py
      - run: npm ci
      - run: npm run sync:pages
      - name: Commit refreshed research metadata
        run: |
          if [[ -n "$(git status --porcelain public/data data assets index.html)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data data assets index.html
            git commit -m "chore: refresh weekly research metadata"
            git push
          else
            echo "No data changes"
          fi
